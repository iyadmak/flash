repos:
  - repo: local
    hooks:
      - id: ruff	# linter
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format		# formatter
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: mypy	# type-checker
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false
